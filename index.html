<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Trắc Nghiệm CNXHKH - 150 Câu</title>
    <style>
        /* CSS STYLE */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            padding: 15px;
            background: #eee;
            border-radius: 8px;
            overflow: visible;
            /* thêm dòng này */
            min-height: 50px;
            /* thêm dòng này */
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--secondary-color);
            color: white;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button.active {
            background: var(--primary-color);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .control-buttons {
            display: none;
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .btn-shuffle {
            background: #9b59b6;
        }

        .btn-total {
            background: #e67e22 !important;
        }

        .question-item {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: 0.3s;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .options {
            list-style: none;
            padding: 0;
        }

        .options li {
            margin: 10px 0;
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .options li:hover:not(.locked) {
            background: #f8fafc;
            border-color: var(--secondary-color);
        }

        .options li.selected {
            background: #ebf8ff;
            border-color: var(--secondary-color);
        }

        /* Trạng thái kết quả */
        .options li.correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
            font-weight: bold;
        }

        .options li.incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        .result-area {
            display: none;
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        #submit-btn {
            background: var(--success-color);
            font-size: 1.2em;
            padding: 15px 40px;
        }

        #score-display {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Tối ưu cho điện thoại */
        @media (max-width: 768px) {

            body {
                padding: 8px;
            }

            .container {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            .menu-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
                padding: 10px;
                overflow-x: auto;
            }

            .menu-buttons button {
                min-width: 80px;
                font-size: 14px;
                padding: 10px 12px;
            }

            .control-buttons button {
                width: 100%;
                margin-bottom: 8px;
            }

            .question-text {
                font-size: 16px;
            }

            .options li {
                font-size: 14px;
                padding: 10px;
            }

            #submit-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>THI TRẮC NGHIỆM CNXHKH</h1>

        <div id="part-selector" class="menu-buttons">
        </div>
        <div style="text-align:center; margin-bottom:15px;">
            <label>
                <input type="radio" name="mode" value="submit" checked>
                Làm xong rồi nộp
            </label>
            &nbsp;&nbsp;
            <label>
                <input type="radio" name="mode" value="instant">
                Chọn là biết đúng sai
            </label>
        </div>

        <div class="control-buttons" id="controls">
            <button class="btn-shuffle" onclick="shuffleQuestions()">Đảo câu hỏi</button>
            <button class="btn-shuffle" onclick="shuffleAnswers()">Đảo đáp án</button>
        </div>

        <div id="quiz-container">
            <p style="text-align:center; color:#666;">Vui lòng chọn một phần để bắt đầu làm bài.</p>
        </div>

        <div id="result-area" class="result-area">
            <button onclick="submitQuiz()" id="submit-btn">
                Nộp bài & Xem kết quả
            </button>

            <button onclick="retryWrongQuestions()" id="retry-btn"
                style="display:none;background:#e67e22;margin-left:10px;">
                Làm lại câu sai
            </button>

            <div id="score-display"></div>
        </div>
    </div>

    <script>
        /* DATA & LOGIC */
        // Dữ liệu được trích xuất từ file của bạn (Ví dụ mẫu 30 câu đầu, bạn có thể copy thêm đủ 150 câu vào mảng này)
        const rawData = [

            //Chương 1
            { id: 1, q: "Đối tượng nghiên cứu của môn học Lịch sử Đảng Cộng sản Việt Nam là:", a: ["Các sự kiện Lịch sử Đảng", "Cương lĩnh, đường lối, chủ trương, chính sách lớn của Đảng", "Quá trình lãnh đạo, chỉ đạo, tổ chức thực hiện của Đảng trong tiến trình cách mạng", "Tất cả các phương án A, B, C đều đúng"], c: 3 },

            { id: 2, q: "Môn học Lịch sử Đảng Cộng sản Việt Nam có chức năng gì?", a: ["Chức năng nhận thức, tuyên truyền và giáo dục", "Chức năng nhận thức, chức năng giáo dục, chức năng dự báo và phê phán", "Chức năng dự báo và phê bình", "Chức năng giáo dục và phê bình"], c: 1 },

            { id: 3, q: "Môn học Lịch sử Đảng Cộng sản Việt Nam có những nhiệm vụ gì?", a: ["Trình bày hệ thống cương lĩnh, đường lối của Đảng", "Tái hiện tiến trình lịch sử sự lãnh đạo, đấu tranh của Đảng", "Tổng kết lịch sử Đảng, và làm rõ vai trò sức chiến đấu của hệ thống tổ chức Đảng", "Cả A, B, C đều đúng"], c: 3 },

            { id: 4, q: "Học tập môn học Lịch sử Đảng Cộng sản Việt Nam có ý nghĩa gì đối với sinh viên:", a: ["Để tham gia vào lãnh đạo đất nước", "Để học tập các môn học hiệu quả hơn", "Giáo dục lý tưởng, truyền thống đấu tranh cách mạng của Đảng và dân tộc, củng cố, bồi đắp niềm tin đối với sự lãnh đạo của Đảng", "Để cải cách đất nước tiến nhanh, tiến mạnh, tiến vững chắc"], c: 2 },

            { id: 5, q: "Một trong chức năng giáo dục của khoa học Lịch sử Đảng là:", a: ["Sự lãnh đạo của Đảng là nhân tố hàng đầu quyết định thắng lợi của cách mạng", "Tăng cường sự lãnh đạo, nâng cao sức chiến đấu của Đảng, tự phê bình và phê bình là quy luật phát triển của Đảng", "Lý tưởng cách mạng với mục tiêu chiến lược là độc lập dân tộc và chủ nghĩa xã hội", "Từ những gì diễn ra trong quá khứ để hiểu rõ hiện tại và dự báo tương lai"], c: 2 },

            { id: 6, q: "Tại sao khi nghiên cứu, học tập Lịch sử Đảng Cộng sản Việt Nam lại cần phải nhận thức và vận dụng chủ nghĩa duy vật lịch sử?", a: ["Để thấy được sự ưu việt của Đảng Cộng sản Việt Nam so với các đảng phái ở phương Tây", "Để hiểu được sứ mệnh lịch sử của giai cấp công nhân", "Để nhận thức tiến trình cách mạng do Đảng Cộng sản Việt Nam lãnh đạo", "Để hiểu con đường cách mạng giải phóng dân tộc"], c: 2 },

            { id: 7, q: "Trong nghiên cứu Lịch sử Đảng Cộng sản Việt Nam, khi xem xét, đối chiếu các hiện tượng lịch sử trong hình thức tổng quát nhằm mục đích vạch ra bản chất, quy luật, khuynh hướng chung trong sự vận động của sự vật thì đó là cách nghiên cứu dựa trên phương pháp nào?", a: ["Phương pháp logic", "Phương pháp lịch sử", "Phương pháp tổng hợp", "Phương pháp so sánh"], c: 0 },

            { id: 8, q: "Câu nói: “Lịch sử Đảng Cộng sản Việt Nam là cả một pho lịch sử bằng vàng” là của ai?", a: ["Hồ Chí Minh", "Trường Chinh", "Lê Duẩn", "Nguyễn Phú Trọng"], c: 0 },

            { id: 9, q: "Điền từ còn thiếu vào chỗ chấm: “Đảng Cộng sản Việt Nam là đội tiên phong của giai cấp công nhân, đồng thời là đội tiên phong của nhân dân lao động và của dân tộc Việt Nam; đại biểu trung thành lợi ích của giai cấp công nhân, nhân dân lao động và của dân tộc. Đảng lấy chủ nghĩa Mác - Lenin và tư tưởng Hồ Chí Minh làm nền tảng tư tưởng, kim chỉ nam cho hành động, lấy…. làm nguyên tắc tổ chức cơ bản”", a: ["Phê bình và tự phê bình", "Đoàn kết thống nhất trong Đảng", "Kỷ luật nghiêm minh tự giác", "Tập trung dân chủ"], c: 3 },

            { id: 10, q: "Một trong chức năng giáo dục của khoa học lịch sử Đảng là:", a: ["Sự lãnh đạo của Đảng là nhân tố hàng đầu quyết định thắng lợi của cách mạng Việt Nam", "Tăng cường sự lãnh đạo, nâng cao sức chiến đấu của Đảng", "Lý tưởng cách mạng với mục tiêu chiến lược là độc lập dân tộc và chủ nghĩa xã hội", "Từ những gì diễn ra trong quá khứ để hiểu rõ hiện tại và dự báo tương lai"], c: 2 },
            //Chương2
            { id: 11, q: "Thực dân Pháp nổ súng xâm lược nước ta vào ngày tháng năm nào?", a: ["1/9/1858", "1/8/1858", "1/9/1859", "1/8/1859"], c: 0 },

            { id: 12, q: "Thời gian thực dân Pháp tiến hành khai thác thuộc địa lần thứ nhất ở Việt Nam khi nào?", a: ["1858-1884", "1884-1899", "1914-1918", "1897-1914"], c: 3 },

            { id: 13, q: "Trước khi thực dân Pháp xâm lược Việt Nam (1858), xã hội Việt Nam có mấy giai cấp? Đó là giai cấp nào?", a: ["2 giai cấp (Nông dân, Công nhân)", "4 giai cấp (Công nhân, Nông dân, Tư sản, Tiểu tư sản)", "3 giai cấp (Địa chủ phong kiến, Công nhân, Nông dân)", "2 giai cấp (Địa chủ phong kiến, Nông dân)"], c: 3 },

            { id: 14, q: "Trong cuộc khai thác thuộc địa lần thứ nhất của thực dân Pháp ở nước ta có giai cấp mới nào được hình thành?", a: ["Giai cấp tiểu tư sản", "Giai cấp địa chủ", "Giai cấp nông dân và công nhân", "Giai cấp công nhân"], c: 3 },

            { id: 15, q: "Mâu thuẫn chủ yếu và gay gắt nhất ở Việt Nam vào đầu thế kỷ XX là mâu thuẫn nào?", a: ["Mâu thuẫn giữa giai cấp nông dân với đại chủ phong kiến", "Mâu thuẫn giữa giai cấp công nhân với giai cấp tư sản", "Mâu thuẫn giữa giai cấp nông dân, giai cấp công nhân với địa chủ phong kiến", "Mâu thuẫn giữa toàn thể dân tộc Việt Nam với thực dân Pháp và phong kiến phản động"], c: 3 },

            { id: 16, q: "Giai cấp công nhân Việt Nam ra đời có những đặc điểm nào sau đây?", a: ["Chủ yếu xuất thân từ nông dân", "Ra đời trước giai cấp tư sản Việt Nam", "Chịu sự áp bức bóc lột của thực dân Pháp, tư sản và phong kiến", "Cả A, B, C đều đúng"], c: 3 },

            { id: 17, q: "Phong trào Cần Vương (1885-1896) do ai khởi xướng?", a: ["Phan Đình Phùng", "Vua Hàm Nghi và Tôn Thất Thuyết", "Hoàng Hoa Thám", "Nguyễn Thiện Thuật"], c: 1 },

            { id: 18, q: "Hoàng Hoa Thám đã lãnh đạo phong trào yêu nước nào ?", a: ["Bãi Sậy", "Nông dân Yên Thế", "Ba Đình", "Hương Khê"], c: 1 },

            { id: 19, q: "Phong trào Đông Du theo khuynh hướng dân chủ tư sản đầu thế kỷ XX do ai khởi xướng và lãnh đạo?", a: ["Phan Bội Châu", "Phan Châu Trinh", "Huỳnh Thúc Kháng", "Phan Đình Phùng"], c: 0 },

            { id: 20, q: "Tổ chức Cộng sản nào ra đời đầu tiên ở Việt Nam?", a: ["Hội Việt Nam cách mạng thanh niên", "Đông Dương Cộng sản Đảng", "An Nam Cộng sản Đảng", "Đông Dương Cộng sản liên đoàn"], c: 1 },

            { id: 21, q: "Tháng 6 năm 1929 tổ chức Cộng sản nào đã ra đời ở Việt Nam?", a: ["Hội Việt Nam cách mạng thanh niên", "An Nam Cộng sản Đảng", "Đông Dương Cộng sản Đảng", "Đông Dương Cộng sản liên đoàn"], c: 2 },

            { id: 22, q: "Tổ chức An Nam Cộng sản Đảng được thành lập vào thời gian nào?", a: ["Tháng 6/1927", "Tháng 6/1928", "Tháng 6/1929", "Tháng 11/1929"], c: 3 },

            { id: 23, q: "Tổ chức Đông Dương Cộng sản Đảng liên đoàn được thành lập vào thời gian nào?", a: ["Tháng 1/1930", "Tháng 9/1929", "Tháng 2/1930", "Tháng 6/1929"], c: 1 },

            { id: 24, q: "Hội nghị hợp nhất các Tổ chức Cộng sản Đảng diễn ra trong khoảng thời gian nào sau đây?", a: ["7/1/1930- 7/2/1930", "7/2/1930- 8/2/1930", "6/2/1930-8/2/1930", "6/1/1930-7/2/1930"], c: 3 },

            { id: 25, q: "Tại Hội nghị thành lập Đảng Cộng sản Việt Nam, văn kiện nào của Nguyễn Ái Quốc đã được Hội nghị thông qua?", a: ["Chính cương vắn tắt", "Sách lược vắn tắt", "Chương trình tóm tắt và điều lệ vắn tắt", "Cả A, B và C"], c: 3 },

            { id: 26, q: "Chương trình hành động của Đảng Cộng sản Đông Dương tháng 6 năm 1932 do ai soạn thảo?", a: ["Trần Phú", "Hà Huy Tập", "Nguyễn Văn Cừ", "Lê Hồng Phong"], c: 3 },

            { id: 27, q: "Động lực chính của cách mạng Đông Dương được xác định trong Luận cương chính trị tháng 10/1930 là?", a: ["Địa chủ và nông dân", "Toàn thể dân tộc Việt Nam", "Tư sản, tiểu tư sản", "Vô sản và nông dân"], c: 3 },

            { id: 28, q: "Văn kiện nào khẳng định: “Vấn đề thổ địa là cái cốt của cách mạng tư sản dân quyền”?", a: ["Chương trình hành động của Đảng Cộng sản Đông Dương (6/1932)", "Luận cương chính trị (10/1930)", "Chính cương vắn tắt, sách lược vắn tắt (3/2/1930)", "Chung quanh vấn đề chính sách mới của Đảng (10/1936)"], c: 1 },

            { id: 29, q: "Đại hội VII Quốc tế Cộng sản (7/1935) xác định kẻ thù nguy hiểm trước mắt của nhân dân thế giới là gì?", a: ["Chủ nghĩa đế quốc", "Chủ nghĩa thực dân cũ", "Chủ nghĩa sô vanh", "Chủ nghĩa phát xít"], c: 3 },

            { id: 30, q: "Nhiệm vụ trước mắt của cao trào cách mạng 1936-1939 là:", a: ["Đòi những quyền dân chủ đơn sơ (tự do, dân chủ, cơm áo, hòa bình)", "Ruộng đất cho dân cày", "Độc lập dân tộc", "Tiến lên chủ nghĩa xã hội"], c: 0 },

            { id: 31, q: "Đại hội lần thứ mấy của Đảng Cộng sản Việt Nam quyết định lấy ngày 3/2 làm ngày kỉ niệm thành lập Đảng?", a: ["Đại hội I (3/1935)", "Đại Hội II (2/1951)", "Đại hội IV (12/1976)", "Đại hội III (9/1960)"], c: 3 },

            { id: 119, q: "Đại hôi IV (tháng 12/1976) đã xác định đường lối xây dựng, phát triển kinh tế, trong đó nổi bật là:", a: ["Đẩy mạnh công nghiệp hóa xã hội chủ nghĩa bằng ưu tiên phát triển công nghiệp nặng một cách hợp lý trên cơ sở phát triển nông nghiệp và công nghiệp nhẹ.", "Lấy nông nghiệp là mặt trận hàng đầu, ra sức phát triển công nghiệp nhẹ", "Phát triển công nghiệp nặng phải có lựa chọn cả về quy mô, nhịp độ, chú trọng quy mô vừa và nhỏ", "Tạo ra một cơ cấu kinh tế hợp lý, trong đó đặc biệt chú trọng 3 chương trình kinh tế lớn: lương thực – thực phẩm, hàng tiêu dùng, hàng xuất khẩu."], c: 0 },

            { id: 120, q: "Điền từ còn thiếu vào chỗ trống trong đường lối chung của cách mạng xã hội chủ nghĩa được Đảng ta xác định tại Đại hội IV: “Nắm vững chuyên chính vô sản, phát huy quyền làm chủ tập thể của nhân dân lao động, tiến hành đồng thời ba cuộc cách mạng: cách mạng về quan hệ sản xuất, cách mạng khoa học-kỹ thuật, cách mạng tư tưởng và văn hoá, trong đó cách mạng... là then chốt.”", a: ["Khoa học - kỹ thuật", "Quan hệ sản xuất", "Tư tưởng văn hóa", "Khoa học – công nghệ"], c: 0 },

            { id: 121, q: "Hội nghị Trung ương 6 (8/1979) được coi là “bước đột phá đầu tiên” trong tư duy đổi mới kinh tế của Đảng đã đưa ra chủ trương gì:", a: ["Khắc phục những sai lầm, khuyết điểm trong quản lý kinh tế, trong cải tạo xã hội chủ nghĩa, phá bỏ rào cản để cho sản xuất bung ra.", "Thực hiện xây dựng nền kinh tế thị trường định hướng xã hội chủ nghĩa, đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước.", "Chủ trương phát triển kinh tế tư nhân là nhiệm vụ trọng tâm", "Xóa bỏ cơ chế kế hoạch hóa tập trung quan liêu bao cấp."], c: 0 },

            { id: 122, q: "Đổi mới bước đầu trong chính sách của Đảng đối với cơ chế quản lý kinh tế trong lĩnh vực nông nghiệp là:", a: ["Quyết định của Hội đồng Chính phủ (10/1979) về việc tận dụng đất đai trong nông nghiệp để khai hoang, phục hóa…", "Coi nông nghiệp là mặt trận hàng đầu", "Ban Bí thư ban hành Chỉ thị 100-CT/TW 1/1981 về khoán sản phẩm đến nhóm và người lao động trong các hợp tác xã.", "Thực hiện “khoán chui”"], c: 0 },

            { id: 123, q: "Điền từ thích hợp vào chỗ trống, Đại hội V (3/1982) xác định: “Nội dung, bước đi, cách làm thực hiện công nghiệp hoá xã hội chủ nghĩa trong chặng đường đầu tiên là: tập trung sức phát triển mạnh…, coi …. là mặt trận hàng đầu”", a: ["Công nghiệp nặng, công nghiệp", "Công nghiệp, nông nghiệp", "Nông nghiệp, nông nghiệp", "Công nghiệp nặng, nông nghiệp"], c: 2 },

            { id: 124, q: "Hội nghị Trung ương 8 (6/1985) được coi là bước đột phá thứ hai trong quá trình tìm tòi, đổi mới kinh tế của Đảng, tại Hội nghị này, Trung ương Đảng đã chủ trương:", a: ["Chủ trương xóa bỏ nghèo nàn lạc hậu, đưa đất nước phát triển theo cơ chế thị trường định hướng xã hội chủ nghĩa", "Chủ trương phát triển kinh tế tư nhân", "Chủ trương phát triển sản xuất kinh doanh", "Chủ trương xóa bỏ cơ chế tập trung, quan liêu, hành chính, bao cấp"], c: 3 },

            { id: 125, q: "Đại hội đại biểu toàn quốc lần thứ VI (12/1986) diễn ra trong bối cảnh nào?", a: ["Đất nước thoát khỏi tình trạng nghèo nàn lạc hậu, lạm phát được đẩy lùi, đời sống nhân dân tiến bộ", "Vị thế, uy tín của Việt Nam được nâng cao trên trường quốc tế", "Việt Nam bị các nước đế quốc và thù địch bao vây, cấm vận, khủng hoảng kinh tế - xã hội trầm trọng.", "Đất nước mở cửa, hội nhập sâu rộng."], c: 2 },

            { id: 126, q: "Bài học đầu tiên được Đại hội Đảng toàn quốc lần thứ VI (12/1986) rút ra là gì:", a: ["Phải luôn coi nông nghiệp là mặt trận hàng đầu.", "Phải biết nắm bắt thời cơ, tranh thủ thời cơ, tận dụng các cơ hội trong nước và nước ngoài mang lại", "Phải xây dựng Đảng trong sạch vững mạnh", "Trong toàn bộ mọi hoạt động của mình, Đảng phải quán triệt tư tưởng “lấy dân làm gốc”"], c: 3 },

            { id: 133, q: "Đại hội Đại biểu toàn quốc lần thứ X (4/2006) của Đảng đã xác định nhiệm vụ then chốt là gì?", a: ["Xây dựng và chỉnh đốn Đảng", "Phát triển văn hóa, giáo dục", "Phát triển kinh tế", "Hội nhập quốc tế"], c: 0 },
            //Chương5
            { id: 134, q: "Hoàn thành nội dung trong câu sau: “Thắng lợi của Cách mạng tháng Tám năm 1945, thành lập nhà nước…”", a: ["Cộng hòa xã hội chủ nghĩa Việt Nam", "Xã hội chủ nghĩa", "Việt Nam Dân chủ", "Việt Nam Dân chủ Cộng hòa"], c: 3 },

            { id: 135, q: "Hoàn thành nội dung trong câu sau: “Lần này là lần đầu tiên trong lịch sử cách mạng của các dân tộc thuộc địa và nửa thuộc địa, một Đảng mới … đã lãnh đạo cách mạng thành công, đã nắm chính quyền toàn quốc”.", a: ["30 tuổi", "20 tuổi", "15 tuổi", "90 tuổi"], c: 2 },

            { id: 136, q: "Đảng lãnh đạo cuộc kháng chiến chống thực dân Pháp và can thiệp Mỹ của nhân dân ta diễn ra vào khoảng thời gian nào ?", a: ["1945-1946", "1946-1950", "1945-1954", "1950-1954"], c: 2 },

            { id: 137, q: "Đảng lãnh đạo cuộc kháng chiến chống đế quốc Mỹ xâm lược của nhân dân ta diễn ra vào khoảng thời gian nào ?", a: ["1954-1960", "1954-1973", "1954-1975", "1965-1975"], c: 2 },

            { id: 138, q: "Hoàn thành nội dung trong câu sau: Độc lập dân tộc là … tiên quyết để thực hiện chủ nghĩa xã hội và chủ nghĩa xã hội là … bảo đảm vững chắc cho độc lập dân tộc.", a: ["Vấn đề, yếu tố", "Yếu tố, điều kiện", "Căn bản, yêu cầu", "Điều kiện, cơ sở"], c: 3 },

            { id: 139, q: "Hoàn thành nội dung trong câu sau: Cách mạng là sự nghiệp của quần chúng nhân dân, … là người làm nên lịch sử, là chủ thể của lịch sử, đó là quan điểm cơ bản trong lý luận Mác-Lênin về chủ nghĩa duy vật lịch sử, về cách mạng xã hội.", a: ["Công nhân", "Trí thức", "Doanh nhân", "Nhân dân"], c: 3 },

            { id: 140, q: "Hoàn thành nội dung trong câu sau của Chủ tịch Hồ Chí Minh: “Các đồng chí phải giữ gìn đoàn kết trong Đảng như giữ gìn….”", a: ["Chân tay của mình", "Bộ óc của mình", "Trái tim của mình", "Con ngươi của mắt mình"], c: 3 },

            { id: 141, q: "Trong hai cuộc kháng chiến chống thực dân Pháp và đế quốc Mỹ xâm lược, cách mạng Việt Nam đã tranh thủ sự ủng hộ của:", a: ["Liên Xô, Trung Quốc, các nước xã hội chủ nghĩa và bạn bè quốc tế", "Liên Xô, Trung Quốc, Tưởng giới thạch", "Liên Xô, Trung Quốc, đế quốc Anh", "Liên Xô, Trung Quốc, Mỹ"], c: 0 },

            { id: 142, q: "Hoàn thành nội dung trong câu sau: Đảng lấy chủ nghĩa Mác- Lênin, … làm nền tảng tư tưởng và kim chi nam cho hành động.", a: ["Độc lập dân tộc", "Chủ nghĩa xã hội", "Tư sản dân quyền", "Tư tưởng Hồ Chí Minh"], c: 3 },

            { id: 143, q: "Tổng kết tiến trình hơn 90 năm lãnh đạo cách mạng Việt Nam, Đảng đã rút ra mấy bài học kinh nghiệm?", a: ["4", "5", "6", "7"], c: 1 },

            { id: 144, q: "Hoàn thành câu sau: Nhiệm vụ chiến lược của cách mạng Việt Nam hiện nay là bảo vệ vững chắc độc lập, chủ quyền, thống nhất, toàn vẹn lãnh thổ … của Tổ quốc và xây dựng thành công chủ nghĩa xã hội.", a: ["Quốc gia, dân tộc", "Vùng trời, vùng biển", "Biên giới, hải đảo", "Biển, đảo"], c: 3 },

            { id: 145, q: "Trong xây Đảng, vấn đề nào được coi là nội dung cơ bản?", a: ["Tư tưởng cách mạng", "Lối sống cách mạng", "Bản lĩnh cách mạng", "Đạo đức cách mạng"], c: 3 },

            { id: 146, q: "Đảng chủ trương xây dựng các tổ chức Mặt trận, đoàn thể chính trị để làm gì?", a: ["Hoàn thiện hệ thống chính trị", "Đa dạng hoạt động hệ thống chính trị", "Đoàn kết quốc tế", "Đoàn kết toàn dân"], c: 3 },

            { id: 147, q: "Điền từ coàn thiếu vào chỗ trống: Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên chủ nghĩa xã hội (bổ sung, phát triển năm 2011) đã nêu rõ…., xa rời quần chúng nhân dân sẽ dẫn đến tổn thất khôn lường đối với vận mệnh của đất nước, của chế độ xã hội chủ nghĩa và của Đảng.", a: ["Tự cao, tự đại", "Tư túng, chia rẽ", "Tham ô, hối lộ", "Quan liêu, tham nhũng"], c: 3 },

        ];


        let questions = [...rawData];


        let selectedParts = new Set();
        let currentList = [];
        let userAnswers = {};
        let wrongQuestions = [];
        const PARTS = [
            { name: "Chương 1", count: 10 },
            { name: "Chương 2", count: 29 },
            { name: "Chương 3", count: 35 },
            { name: "Chương 4", count: 59 },
            { name: "Chương 5", count: 14 }
        ];
        let isMultipleParts = false;
        let quizMode = "submit";

        // Tạo menu
        const partSelector = document.getElementById('part-selector');
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener("change", (e) => {
                quizMode = e.target.value;
            });
        });
        PARTS.forEach((part, index) => {
            const btn = document.createElement('button');

            btn.innerText = part.name;

            btn.onclick = () => togglePart(index, btn);

            partSelector.appendChild(btn);
        });
        // Nút kết hợp
        const combineBtn = document.createElement('button');
        combineBtn.innerText = "KẾT HỢP PHẦN";
        combineBtn.style.background = "#16a085";
        combineBtn.onclick = combineSelectedParts;
        partSelector.appendChild(combineBtn);

        // Nút bỏ chọn
        const clearBtn = document.createElement('button');
        clearBtn.innerText = "BỎ CHỌN";
        clearBtn.style.background = "#e74c3c";
        clearBtn.onclick = () => {
            selectedParts.clear();
            document.querySelectorAll('.menu-buttons button')
                .forEach(b => b.classList.remove('active'));
        };
        partSelector.appendChild(clearBtn);

        // Toggle chọn phần
        function togglePart(part, btn) {
            if (selectedParts.has(part)) {
                selectedParts.delete(part);
                btn.classList.remove('active');
            } else {
                selectedParts.add(part);
                btn.classList.add('active');
            }
        }

        // Gộp câu hỏi
        function combineSelectedParts() {
            if (selectedParts.size === 0) {
                alert("Vui lòng chọn ít nhất 1 phần!");
                return;
            }

            isMultipleParts = selectedParts.size >= 2;

            userAnswers = {};
            wrongQuestions = [];

            document.getElementById('retry-btn').style.display = 'none';

            document.getElementById('score-display').innerHTML = '';

            // 👉 THÊM DÒNG NÀY
            document.getElementById('result-area').style.display = 'block';

            if (quizMode === "instant") {
                document.getElementById('submit-btn').style.display = 'none';
            } else {
                document.getElementById('submit-btn').style.display = 'inline-block';
            }

            document.getElementById('controls').style.display = 'block';

            currentList = [];

            selectedParts.forEach(partIndex => {

                let start = 0;

                for (let i = 0; i < partIndex; i++) {
                    start += PARTS[i].count;
                }

                const end = start + PARTS[partIndex].count;

                const partQuestions = questions.slice(start, end);

                currentList = currentList.concat(
                    JSON.parse(JSON.stringify(partQuestions))
                );
            });

            renderQuiz();
            window.scrollTo(0, 0);
        }
        // Render câu hỏi
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = currentList.map((item, idx) => `
        <div class="question-item" id="q-box-${idx}">
            <div class="question-text">
    Câu ${idx + 1}: ${item.q}
</div>
            <ul class="options">
                ${item.a.map((opt, oIdx) => `
                    <li onclick="selectOption(${idx}, ${oIdx})" id="opt-${idx}-${oIdx}">
                        <strong>${String.fromCharCode(65 + oIdx)}.</strong> ${opt}
                    </li>
                `).join('')}
            </ul>
        </div>
    `).join('');
        }

        // Chọn đáp án
        function selectOption(qIdx, oIdx) {
            const item = currentList[qIdx];

            if (document.getElementById(`opt-${qIdx}-0`).classList.contains('locked')) return;

            const parent = document.getElementById(`q-box-${qIdx}`);
            const options = parent.querySelectorAll('li');

            // reset chọn
            options.forEach(li => li.classList.remove('selected'));

            // chọn
            document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('selected');

            // lưu đáp án
            userAnswers[qIdx] = oIdx;

            // 👉 CHẾ ĐỘ HIỆN NGAY ĐÚNG SAI
            if (quizMode === "instant") {
                options.forEach(li => li.classList.add('locked'));

                const correctIdx = item.c;

                // tô đáp án đúng
                document.getElementById(`opt-${qIdx}-${correctIdx}`).classList.add('correct');

                // nếu chọn sai
                if (oIdx !== correctIdx) {
                    document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('incorrect');
                }
                if (oIdx !== correctIdx) {

                    currentList[qIdx].isWrong = true;

                } else {

                    currentList[qIdx].isWrong = false;

                }
                collectWrongInstantQuestions();

            }
        }

        // Đảo câu hỏi
        function shuffleQuestions() {
            currentList.sort(() => Math.random() - 0.5);
            userAnswers = {};
            renderQuiz();
        }

        // Đảo đáp án
        function shuffleAnswers() {
            currentList.forEach(item => {
                const correctText = item.a[item.c];
                item.a.sort(() => Math.random() - 0.5);
                item.c = item.a.indexOf(correctText);
            });
            userAnswers = {};
            renderQuiz();
        }

        // Nộp bài
        function submitQuiz() {
            let score = 0;
            wrongQuestions = [];

            currentList.forEach((item, idx) => {
                const correctIdx = item.c;
                const selectedIdx = userAnswers[idx];

                const options = document.querySelectorAll(`#q-box-${idx} li`);
                options.forEach(li => li.classList.add('locked'));

                document.getElementById(`opt-${idx}-${correctIdx}`).classList.add('correct');

                if (selectedIdx !== undefined) {

                    if (selectedIdx === correctIdx) {

                        score++;

                    } else {

                        document.getElementById(`opt-${idx}-${selectedIdx}`)
                            .classList.add('incorrect');

                        wrongQuestions.push(
                            JSON.parse(JSON.stringify(item))
                        );
                    }

                } else {

                    wrongQuestions.push(
                        JSON.parse(JSON.stringify(item))
                    );

                }
            });

            document.getElementById('score-display').innerText =
                `Kết quả: ${score} / ${currentList.length} câu đúng`;
            if (wrongQuestions.length > 0) {

                document.getElementById('retry-btn').style.display = 'inline-block';

            } else {

                document.getElementById('retry-btn').style.display = 'none';

            }

            window.scrollTo(0, document.body.scrollHeight);
        }
        function retryWrongQuestions() {

            if (wrongQuestions.length === 0) {
                alert("Không còn câu sai nào!");
                return;
            }

            currentList = JSON.parse(JSON.stringify(wrongQuestions));

            currentList.forEach(q => {
                q.isWrong = false;
            });

            userAnswers = {};
            wrongQuestions = [];

            document.getElementById('score-display').innerHTML =
                `Đang làm lại ${currentList.length} câu sai`;

            document.getElementById('retry-btn').style.display = 'none';

            renderQuiz();

            window.scrollTo(0, 0);
        }
        function collectWrongInstantQuestions() {

            wrongQuestions = currentList.filter(q => q.isWrong);

            if (wrongQuestions.length > 0) {

                document.getElementById('retry-btn').style.display =
                    'inline-block';

            } else {

                document.getElementById('retry-btn').style.display =
                    'none';
            }
        }
    </script>

</body>

</html>
